<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Simple Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h1>Hello from Daniel's Mini App! 🚀</h1>
  <p>This is launched via keyboard button.</p>

  <button onclick="sendHello()">Send Data to Bot & Close</button>

  <script>
    Telegram.WebApp.ready();          // Required
    Telegram.WebApp.expand();         // Optional: full screen

    function sendHello() {
      Telegram.WebApp.sendData("Hello from index.html! User said hi.");
      // Telegram.WebApp.close();      // Optional: close immediately
    }
  </script>
</body>
</html>
