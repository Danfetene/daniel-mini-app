<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Grace Products</title>

  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>

  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #f8fafc);
      --tg-text: var(--tg-theme-text-color, #1e293b);
      --tg-hint: var(--tg-theme-hint-color, #64748b);
      --accent: #6366f1;           /* indigo – modern & trustworthy */
      --accent-dark: #4f46e5;
      --success: #10b981;          /* emerald – for price & action */
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(226,232,240,0.8);
      --shadow-sm: 0 6px 16px rgba(0,0,0,0.08);
      --shadow-md: 0 12px 28px rgba(99,102,241,0.18);
      --radius: 16px;
      --transition: all 0.26s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --tg-bg: #0f172a;
        --tg-text: #e2e8f0;
        --tg-hint: #94a3b8;
        --card-bg: rgba(30,41,59,0.65);
        --card-border: rgba(59,69,89,0.6);
        --shadow-sm: 0 8px 20px rgba(0,0,0,0.4);
        --shadow-md: 0 14px 32px rgba(99,102,241,0.25);
      }
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100vh;
      padding-bottom: 100px;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      text-align: center;
      padding: 1.3rem 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(99,102,241,0.25);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.94;
      margin-top: 0.4rem;
    }

    .container {
      padding: 1rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.1rem;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }

    .product-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-md);
    }

    .product-image-wrapper {
      position: relative;
      height: 180px;           /* ← smaller image size */
      overflow: hidden;
      background: linear-gradient(145deg, #e0e7ff, #f3e8ff);
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: contain;     /* better for product bottles */
      object-position: center;
      transition: transform 0.4s ease;
    }

    .product-card:active .product-image,
    .product-card:hover .product-image {
      transform: scale(1.08);
    }

    .product-info {
      padding: 1.1rem 1rem;
    }

    .product-name {
      font-size: 1.22rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .product-size {
      font-size: 0.92rem;
      color: var(--tg-hint);
      margin-bottom: 0.6rem;
    }

    .product-price {
      font-size: 1.48rem;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1.03rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(16,185,129,0.3);
      width: 100%;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn:active::after {
      width: 300px;
      height: 300px;
      transition: width 0s, height 0s;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(16,185,129,0.4);
    }

    .fixed-bottom {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--card-border);
      padding: 1rem;
      box-shadow: 0 -6px 16px rgba(0,0,0,0.12);
      z-index: 100;
      display: flex;
      justify-content: center;
    }

    .fixed-bottom .btn {
      max-width: 360px;
      padding: 1.05rem;
      font-size: 1.08rem;
    }

    .footer-text {
      text-align: center;
      font-size: 0.84rem;
      color: var(--tg-hint);
      margin: 2rem 1rem 1rem;
    }

    @media (max-width: 480px) {
      .product-grid { grid-template-columns: 1fr; }
      header { padding: 1.1rem 0.9rem; }
      h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Grace Soap & Cosmetics</h1>
    <div class="subtitle">Premium • Ethiopian Made • Trusted Quality</div>
  </header>

  <div class="container">
    <div class="product-grid" id="products"></div>
  </div>

  <div class="footer-text">
    GRACE SOAP AND COSMETICS MANUFACTURING PLC
  </div>

  <div class="fixed-bottom">
    <button class="btn" id="contactBtn">
      📲 WhatsApp / Call: 0912672353
    </button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const products = [
      { name: "Grace Dettol",       size: "5 Liter",   price: "100 Birr",  image: "https://i.postimg.cc/2SQQBYqF/g-dettol.jpg" },
      { name: "Grace Handwash",     size: "0.5 Liter", price: "100 Birr",  image: "https://i.postimg.cc/htvJKqLz/g-b.jpg" },
      { name: "Grace Liquid Soap",  size: "5 Liter",   price: "450 Birr",  image: "https://i.postimg.cc/LszmpybL/g-liq.jpg" },
      { name: "Grace Dish Wash",    size: "0.8 Liter", price: "100 Birr",  image: "https://via.placeholder.com/400x300/FF9800/FFFFFF?text=Grace+Dish+Wash+0.8L" },
      { name: "Grace Bleaching",    size: "0.8 Liter", price: "80 Birr",   image: "https://i.postimg.cc/wMDXcYfm/g-tile-clea.jpg" },
      { name: "Grace Bleaching",    size: "0.5 Liter", price: "40 Birr",   image: "https://i.postimg.cc/tRmQLQgb/g-bli.jpg" }
    ];

    const container = document.getElementById("products");

    products.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-image-wrapper">
          <img class="product-image" src="${p.image}" alt="${p.name}" loading="lazy">
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-size">${p.size}</div>
          <div class="product-price">${p.price}</div>
          <button class="btn">Order Now</button>
        </div>
      `;

      card.querySelector(".btn").onclick = () => {
        const msg = `Hi Grace! Interested in ${p.name} ${p.size} – ${p.price}`;
        const wa = `https://wa.me/0912672353?text=${encodeURIComponent(msg)}`;
        window.open(wa, '_blank');
        setTimeout(() => window.location.href = 'tel:0912672353', 1500);
      };

      container.appendChild(card);
    });

    document.getElementById("contactBtn").onclick = () => {
      const msg = "Hello! Interested in Grace products";
      window.open(`https://wa.me/0912672353?text=${encodeURIComponent(msg)}`, '_blank');
      setTimeout(() => window.location.href = 'tel:0912672353', 1500);
    };
  </script>
</body>
</html>
