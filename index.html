<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Shop – Addis</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin: 20px 0 32px;
    }

    h1 {
      margin: 0;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .subtitle {
      margin-top: 6px;
      font-size: 1rem;
      opacity: 0.8;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
    }

    #brands-screen {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.22s ease;
      border: 1px solid rgba(255,255,255,0.12);
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      transform: scale(0.94);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .brand-name {
      font-size: 2.1rem;
      font-weight: 800;
      margin: 12px 0 8px;
      letter-spacing: 1.5px;
    }

    .desc {
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.4;
      margin: 0;
    }

    .price-card {
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px 16px;
      margin: 16px 0;
      font-size: 2.2rem;
      font-weight: bold;
      width: 80%;
      max-width: 300px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .price-card:active {
      transform: scale(0.96);
    }

    .price-35 { background: #ff6d00; }
    .price-30 { background: #ffa000; }
    .price-25 { background: #43a047; }

    #status {
      margin-top: 16px;
      font-size: 1.1rem;
      min-height: 1.5em;
      opacity: 0.85;
      text-align: center;
    }

    .success { color: #76ff03; }
    .error   { color: #ff5252; }

    /* Brand colors */
    .top    { color: #00d4ff; }
    .gold   { color: #ffd700; }
    .one    { color: #4caf50; }
    .share  { color: #e91e63; }
  </style>
</head>
<body>

  <header>
    <h1>Bottled Water Shop</h1>
    <div class="subtitle">Choose brand & size • Addis Ababa</div>
  </header>

  <!-- ─── BRANDS SCREEN ─────────────────────────────────────── -->
  <div id="brands-screen" class="screen">
    <div class="card" data-brand="Top">
      <div class="brand-name top">TOP</div>
      <p class="desc">Pure & Crisp<br>Most popular</p>
    </div>

    <div class="card" data-brand="Gold">
      <div class="brand-name gold">GOLD</div>
      <p class="desc">Premium quality<br>Golden taste</p>
    </div>

    <div class="card" data-brand="One">
      <div class="brand-name one">ONE</div>
      <p class="desc">Clean & Simple<br>Everyday choice</p>
    </div>

    <div class="card" data-brand="Share">
      <div class="brand-name share">SHARE</div>
      <p class="desc">Share the freshness<br>Friendly & light</p>
    </div>
  </div>

  <!-- ─── PRICES SCREEN ─────────────────────────────────────── -->
  <div id="prices-screen" class="screen">
    <h2 id="selected-brand" style="margin: 20px 0 8px; font-size: 2rem;"></h2>
    <div class="price-card price-35" data-price="35">35 ETB</div>
    <div class="price-card price-30" data-price="30">30 ETB</div>
    <div class="price-card price-25" data-price="25">25 ETB</div>

    <button onclick="showBrands()" style="margin-top:32px; padding:12px 28px; font-size:1.1rem; background:#444; color:white; border:none; border-radius:12px; cursor:pointer;">
      ← Back to brands
    </button>
  </div>

  <div id="status"></div>

  <script>
    // ────────────────────────────────────────────────
    //   CHANGE THESE TWO VALUES
    // ────────────────────────────────────────────────
    const BOT_TOKEN = "YOUR_BOT_TOKEN_HERE";   // ← from @BotFather
    const CHAT_ID   = "123456789";             // ← your Telegram ID
    // ────────────────────────────────────────────────

    const statusEl       = document.getElementById("status");
    const brandsScreen   = document.getElementById("brands-screen");
    const pricesScreen   = document.getElementById("prices-screen");
    const selectedBrandEl = document.getElementById("selected-brand");

    let currentBrand = "";

    function showBrands() {
      brandsScreen.style.display = "grid";
      pricesScreen.style.display = "none";
      statusEl.textContent = "";
    }

    function showPrices(brand) {
      currentBrand = brand;
      selectedBrandEl.textContent = brand;
      brandsScreen.style.display = "none";
      pricesScreen.style.display = "flex";
      statusEl.textContent = "";
    }

    async function sendOrder(brand, price) {
      statusEl.textContent = "Sending...";
      statusEl.className = "";

      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `🛒 Order: **${brand}**  –  ${price} ETB`,
            parse_mode: "Markdown"
          })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          statusEl.textContent = `✓ ${brand} ${price} ETB sent!`;
          statusEl.className = "success";
          setTimeout(showBrands, 2200);   // auto return to brands after success
        } else {
          statusEl.textContent = "Error sending";
          statusEl.className = "error";
        }

      } catch (err) {
        statusEl.textContent = "No internet?";
        statusEl.className = "error";
      }
    }

    // Brand clicks
    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const brand = card.dataset.brand;
        showPrices(brand);
      });
    });

    // Price clicks
    document.querySelectorAll(".price-card").forEach(card => {
      card.addEventListener("click", () => {
        const price = card.dataset.price;
        sendOrder(currentBrand, price);
      });
    });

    // Start with brands screen
    showBrands();
  </script>

</body>
</html>
